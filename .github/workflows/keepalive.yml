name: Keep Backend Alive

on:
  schedule:
    # Runs every 12 minutes to prevent Render free tier from sleeping (it sleeps after 15 mins of inactivity)
    - cron: '*/12 * * * *'
  workflow_dispatch: # Allows manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend
        run: |
          echo "Pinging the backend to keep it alive..."
          curl -sS https://crop-advisor-backend-3plz.onrender.com/districts > /dev/null
          echo "Ping completed."
